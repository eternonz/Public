name: Deploy EternoWebsite to GitHub Pages

# Source code lives privately in eternonz/Private ("20260514 - EternoWebsite/Build").
# It is built locally; only the rendered output is committed here under
# "20260514 - EternoWebsite/Doc/site". This workflow only PUBLISHES that output
# (no build) so source + private assets never enter the public repo.

on:
  push:
    branches: [main]
    paths:
      - "20260514 - EternoWebsite/Doc/site/**"
      - ".github/workflows/deploy-eterno.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "20260514 - EternoWebsite/Doc/site"
      - id: deployment
        uses: actions/deploy-pages@v4
